services:
  one-rss:
    build: .
    container_name: one-rss
    ports:
      - "6011:6011"
    volumes:
      - one-rss-data:/data
    environment:
      - PORT=6011
      - DB_PATH=/data/one-rss.db
      - RSSHUB_URL=http://rsshub:1200
      - NO_PROXY=localhost,127.0.0.1,rsshub
      - no_proxy=localhost,127.0.0.1,rsshub
    depends_on:
      - rsshub
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6011/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  rsshub:
    image: diygod/rsshub
    container_name: rsshub
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory

volumes:
  one-rss-data:
    driver: local
