version: '3.8'

services:
  one-rss:
    build: .
    container_name: one-rss
    ports:
      - "6011:6011"
    volumes:
      - one-rss-data:/data
    environment:
      - PORT=6011
      - DB_PATH=/data/one-rss.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6011/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  one-rss-data:
    driver: local
